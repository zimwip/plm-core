spring.application.name=psm-api

# ============================================================
# Vault (demo): all secret/sensitive config sourced from secret/plm.
# `optional:` lets tests start without Vault (falls through to defaults).
# ============================================================
spring.config.import=vault://
spring.cloud.vault.uri=${VAULT_ADDR:http://vault:8200}
spring.cloud.vault.authentication=TOKEN
spring.cloud.vault.token=${VAULT_TOKEN:plm-demo-services}
spring.cloud.vault.kv.enabled=true
spring.cloud.vault.kv.backend=secret
spring.cloud.vault.kv.application-name=plm
spring.cloud.vault.kv.default-context=plm
spring.cloud.vault.fail-fast=true
# Retry while vault is still starting / DNS not yet resolvable.
spring.cloud.vault.retry.enabled=true
spring.cloud.vault.retry.initial-interval=1500
spring.cloud.vault.retry.max-interval=10000
spring.cloud.vault.retry.multiplier=1.5
spring.cloud.vault.retry.max-attempts=15

# H2 datasource (local dev / tests — overridden by docker-compose env vars)
spring.datasource.url=jdbc:h2:mem:plmdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=VALUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JOOQ
spring.jooq.sql-dialect=POSTGRES

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# In PostgreSQL (docker-compose), SPRING_FLYWAY_DEFAULT_SCHEMA=psm and
# SPRING_FLYWAY_CREATE_SCHEMAS=true create and migrate into the 'psm' schema.
# SPRING_DATASOURCE_HIKARI_SCHEMA=psm sets the connection search_path so all
# JOOQ queries resolve unqualified table names against 'psm'.
# In H2 dev/test mode these env vars are absent and tables land in PUBLIC.

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# OpenTelemetry tracing (OTLP/HTTP → Jaeger :4318)
# Override endpoint via OTEL_EXPORTER_OTLP_ENDPOINT or management.otlp.tracing.endpoint
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
management.otlp.tracing.transport=http
otel.service.name=psm-api

# Trace id + span id in logs (MDC)
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# Shared platform-lib auth filter (replaces local JwtAuthFilter).
plm.auth.service-secret=${plm.service.secret}
plm.auth.clock-skew-seconds=${plm.jwt.clock-skew-seconds:5}

# Outbox poller interval in milliseconds
# plm.outbox.poll-interval-ms=200

# Inter-service secret (must match pno.service.secret in pno-api)
# Sourced from Vault key plm.service.secret. Test profiles provide a fallback.
# plm.service.secret=<resolved-from-vault>

# JWT (verify only — spe-api mints). Non-secret tuning sourced from Vault too.
# plm.jwt.clock-skew-seconds=<resolved-from-vault>

# platform-api self-registration (handled by platform-lib auto-config)
platform.registration.service-code=psm
platform.registration.extra-paths=/v3/api-docs/**,/swagger-ui/**
platform.registration.self-base-url=${SPE_SELF_BASE_URL:http://psm-api:8080}
platform.registration.platform-url=${PLM_PLATFORM_URL:http://platform-api:8084}
platform.registration.service-secret=${plm.service.secret}
platform.registration.space-tag=${SPE_SPACE_TAG:}

# PSM Admin config registration
psm.config.admin-url=${PSM_CONFIG_ADMIN_URL:http://psm-admin:8083}
psm.config.service-code=${PSM_CONFIG_SERVICE_CODE:psm-data}
psm.config.self-base-url=${PSM_CONFIG_SELF_BASE_URL:http://localhost:8080}
psm.config.service-secret=${plm.service.secret:}

# Settings-api registration (disabled by default; docker-compose enables)
plm.settings.enabled=${PLM_SETTINGS_ENABLED:false}
plm.settings.settings-url=${PLM_PLATFORM_URL:http://platform-api:8084}
plm.settings.service-code=psm
plm.settings.self-base-url=${SPE_SELF_BASE_URL:http://localhost:8080}
plm.settings.service-secret=${plm.service.secret:}

# Federated resource catalog registration (creatable / listable resources)
plm.resources.enabled=${PLM_RESOURCES_ENABLED:true}
plm.resources.platform-url=${PLM_PLATFORM_URL:http://platform-api:8084}

# Microfrontend plugin declarations (served at /api/psm/ui/<entry>)
plm.ui.enabled=true

# NATS messaging (enabled in docker-compose via NATS_URL env var)
plm.nats.enabled=${PLM_NATS_ENABLED:false}
plm.nats.url=${NATS_URL:nats://nats:4222}
plm.nats.connection-name=psm-api

# Platform-lib authorization sidecar: pull v2 snapshot from pno-api and run the
# shared Casbin enforcer + @PlmPermission aspect. psm-api contributes no scopes.
plm.permission.enabled=${PLM_PERMISSION_ENABLED:true}
plm.permission.pno-url=${PNO_API_URL:http://pno-api:8081}

# CAD API (internal, not exposed via spe-api)
cad.api.internal.url=${CAD_API_INTERNAL_URL:http://cad-api:8087}

# Multipart upload limits (CAD files forwarded to cad-api)
spring.servlet.multipart.max-file-size=1GB
spring.servlet.multipart.max-request-size=1GB

# Logging
logging.level.org.jooq.tools.LoggerListener=WARN
