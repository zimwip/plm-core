spring.application.name=plm-core

# H2 datasource (local dev / tests — overridden by docker-compose env vars)
spring.datasource.url=jdbc:h2:mem:plmdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=VALUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JOOQ
spring.jooq.sql-dialect=POSTGRES

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# In PostgreSQL (docker-compose), SPRING_FLYWAY_DEFAULT_SCHEMA=psm and
# SPRING_FLYWAY_CREATE_SCHEMAS=true create and migrate into the 'psm' schema.
# SPRING_DATASOURCE_HIKARI_SCHEMA=psm sets the connection search_path so all
# JOOQ queries resolve unqualified table names against 'psm'.
# In H2 dev/test mode these env vars are absent and tables land in PUBLIC.

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# OpenTelemetry tracing (OTLP/HTTP → Jaeger :4318)
# Override endpoint via OTEL_EXPORTER_OTLP_ENDPOINT or management.otlp.tracing.endpoint
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
management.otlp.tracing.transport=http
otel.service.name=psm-api

# Trace id + span id in logs (MDC)
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# PNO API (People & Organisation) — user/role resolution
# Overridden in docker-compose via PNO_API_URL env var
pno.api.url=http://localhost:8081

# Auth filter — comma-separated URI prefixes that bypass authentication
# plm.auth.public-paths=/actuator,/v3/api-docs,/swagger-ui,/ws

# Outbox poller interval in milliseconds
# plm.outbox.poll-interval-ms=200

# Inter-service secret (must match pno.service.secret in pno-api)
# Override via PLM_SERVICE_SECRET env var in production. Must be >= 32 bytes (HS256).
plm.service.secret=dev-secret-change-in-prod-dev-secret-change-in-prod

# JWT (verify only — spe-api mints)
plm.jwt.clock-skew-seconds=5

# SPE gateway — where to register at startup
spe.api.url=http://spe-api:8082
spe.self.base-url=http://psm-api:8080

# Logging
logging.level.org.jooq.tools.LoggerListener=WARN
