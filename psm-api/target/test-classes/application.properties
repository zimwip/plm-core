# Test-only config — no Vault dependency. Inherits everything from main
# application.properties and overrides Vault-sourced values with dev defaults.
spring.cloud.vault.enabled=false
plm.service.secret=dev-secret-change-in-prod-dev-secret-change-in-prod
plm.jwt.ttl-seconds=60
plm.jwt.session-ttl-seconds=3600
plm.jwt.clock-skew-seconds=5

# Force explicit H2 URL with NON_KEYWORDS=VALUE to prevent Spring Boot Test
# auto-configuration from generating a random URL without our required parameters.
# Without this, Spring Boot Test generates a random URL like jdbc:h2:mem:<uuid>
# which lacks NON_KEYWORDS=VALUE, causing H2 to reject the 'value' column name.
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=VALUE;DB_CLOSE_DELAY=-1
spring.test.database.replace=NONE
spring.jooq.sql-dialect=POSTGRES

# Platform registration (needed for LocalServiceRegistry → ServiceClient → PolicyEnforcer chain)
platform.registration.service-code=psm
platform.registration.self-base-url=http://localhost:8080
platform.registration.platform-url=http://localhost:9999
platform.registration.service-secret=${plm.service.secret}

# Config registration (needed for ConfigCache → ActionDispatcher)
psm.config.admin-url=http://localhost:9998
psm.config.service-code=psm-data
psm.config.self-base-url=http://localhost:8080
psm.config.service-secret=${plm.service.secret}

# Auth filter
plm.auth.service-secret=${plm.service.secret}
plm.auth.clock-skew-seconds=5

# Authorization (needed for PolicyEnforcer — PNO call is background, fails gracefully)
plm.permission.enabled=true
plm.permission.pno-url=http://localhost:9997

# Disable features not needed in tests
plm.nats.enabled=false
plm.settings.enabled=false
plm.resources.enabled=false
