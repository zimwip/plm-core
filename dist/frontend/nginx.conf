server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # With a literal hostname in proxy_pass, nginx resolves once at startup
    # and never re-resolves — so recreating a container breaks routing.
    # Fix: use DNS resolver + $variable in proxy_pass.
    # __NGINX_RESOLVER__ is replaced at container startup by docker-entrypoint.sh
    # from /etc/resolv.conf (Docker → 127.0.0.11, Podman → bridge IP).
    resolver __NGINX_RESOLVER__ valid=10s ipv6=off;

    # All /api/* goes to spe-api (the gateway)
    location /api/ {
        set $spe spe-api:8082;
        proxy_pass         http://$spe;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-PLM-User         $http_x_plm_user;
        proxy_set_header   X-PLM-Tx           $http_x_plm_tx;
        proxy_set_header   X-PLM-ProjectSpace $http_x_plm_projectspace;
    }

    # WebSocket → spe-api (which proxies to ws-gateway through gateway routing).
    #
    # ws-gateway runs with context-path=/api/ws and the WebSocket handler is registered
    # at "/", so the only URI that matches the handler is "/api/ws/" (with trailing slash).
    # Tomcat normally 302-redirects "/api/ws" → "/api/ws/", but reactor-netty's WebSocket
    # client refuses to follow redirects during the upgrade handshake, and browsers do
    # not reliably follow 3xx during the WS upgrade either. We rewrite at the edge via
    # proxy_pass URI so nginx forwards the corrected path without ever emitting a 3xx.
    location = /api/ws {
        set $spe spe-api:8082;
        proxy_pass         http://$spe/api/ws/$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-PLM-User $http_x_plm_user;
        proxy_read_timeout 3600s;
    }

    location /api/ws/ {
        set $spe spe-api:8082;
        proxy_pass         http://$spe;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-PLM-User $http_x_plm_user;
        proxy_read_timeout 3600s;
    }

    # Actuator (frontend reconnect probe)
    location /actuator/ {
        set $spe spe-api:8082;
        proxy_pass         http://$spe;
        proxy_http_version 1.1;
        proxy_set_header   Host      $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # OpenAPI spec + Swagger UI (served by psm-api, routed through spe gateway).
    # The API Playground fetches /v3/api-docs to render the endpoint catalog.
    location /v3/api-docs {
        set $spe spe-api:8082;
        proxy_pass         http://$spe;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   Authorization      $http_authorization;
    }
    location /swagger-ui/ {
        set $spe spe-api:8082;
        proxy_pass         http://$spe;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   Authorization      $http_authorization;
    }

    # Security headers
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "DENY"            always;
    add_header X-XSS-Protection        "1; mode=block"   always;
    add_header Referrer-Policy         "no-referrer"     always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:; img-src 'self' data:" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static asset caching
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
