server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # With a literal hostname in proxy_pass, nginx resolves once at startup
    # and never re-resolves — so recreating a container breaks routing.
    #
    # Fix: configure the DNS resolver + use a $variable in proxy_pass.
    # nginx only re-resolves (at the resolver TTL) when the upstream URL
    # contains a variable.  The variable holds hostname:port only;
    # proxy_pass receives no explicit path so nginx forwards the full
    # original request URI unchanged — which is what we want since our
    # location prefixes mirror the upstream paths exactly.
    #
    # __NGINX_RESOLVER__ is replaced at container startup by docker-entrypoint.sh
    # which reads the actual nameserver from /etc/resolv.conf:
    #   Docker Desktop (Win/Mac/Linux) → 127.0.0.11
    #   Podman                         → bridge IP (e.g. 10.89.0.1)
    resolver __NGINX_RESOLVER__ valid=10s ipv6=off;

    # Proxy PNO API (People & Organisation) → pno-api service
    # Must be listed before /api/psm/ to take precedence.
    location /api/pno/ {
        set $pno pno-api:8081;
        proxy_pass         http://$pno;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-PLM-User         $http_x_plm_user;
    }

    # Proxy PSM API calls → Spring Boot backend
    location /api/psm/ {
        set $psm psm-api:8080;
        proxy_pass         http://$psm;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-PLM-User         $http_x_plm_user;
        proxy_set_header   X-PLM-Tx           $http_x_plm_tx;
        proxy_set_header   X-PLM-ProjectSpace  $http_x_plm_projectspace;
    }

    # Proxy actuator (health check for reconnect detection)
    location /actuator/ {
        set $act psm-api:8080;
        proxy_pass         http://$act;
        proxy_http_version 1.1;
        proxy_set_header   Host      $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Proxy OpenAPI spec → Spring Boot backend
    location /v3/ {
        set $v3 psm-api:8080;
        proxy_pass         http://$v3;
        proxy_http_version 1.1;
        proxy_set_header   Host      $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Proxy WebSocket → Spring Boot
    location /ws {
        set $ws psm-api:8080;
        proxy_pass         http://$ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    # Security headers
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "DENY"            always;
    add_header X-XSS-Protection        "1; mode=block"   always;
    add_header Referrer-Policy         "no-referrer"     always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws:; img-src 'self' data:" always;

    # SPA fallback : toutes les routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache assets statiques
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
