spring.application.name=platform-api-test
server.port=0

# Disable Vault in tests
spring.cloud.vault.enabled=false

# Disable tracing in tests
management.tracing.enabled=false

# Use a dummy secret for tests (>= 32 bytes)
plm.service.secret=test-secret-at-least-32-bytes-long!!

# Disable SPE registration in tests
spe.registration.enabled=false
# Disable shared auth filter in tests (no real JWT minted)
plm.auth.enabled=false
