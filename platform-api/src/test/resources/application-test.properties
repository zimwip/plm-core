spring.application.name=platform-api-test
server.port=0

# Disable Vault in tests
spring.cloud.vault.enabled=false

# Disable tracing in tests
management.tracing.enabled=false

# Use a dummy secret for tests (>= 32 bytes)
plm.service.secret=test-secret-at-least-32-bytes-long!!

# Disable SPE registration in tests
platform.registration.enabled=false
# Disable shared auth filter in tests (no real JWT minted)
plm.auth.enabled=false

# Disable NATS in tests (no broker available)
plm.nats.enabled=false

# Disable settings registration in tests
plm.settings.enabled=false

# H2 datasource for tests (overrides application.properties defaults)
spring.datasource.url=jdbc:h2:mem:platformdb-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=VALUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.flyway.enabled=true
