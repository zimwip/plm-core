spring.application.name=platform-api
server.port=8084

# Vault
spring.config.import=vault://
spring.cloud.vault.uri=${VAULT_ADDR:http://vault:8200}
spring.cloud.vault.authentication=TOKEN
spring.cloud.vault.token=${VAULT_TOKEN:plm-demo-services}
spring.cloud.vault.kv.enabled=true
spring.cloud.vault.kv.backend=secret
spring.cloud.vault.kv.application-name=plm
spring.cloud.vault.kv.default-context=plm
spring.cloud.vault.fail-fast=true
# Retry while vault is still starting / DNS not yet resolvable.
spring.cloud.vault.retry.enabled=true
spring.cloud.vault.retry.initial-interval=1500
spring.cloud.vault.retry.max-interval=10000
spring.cloud.vault.retry.multiplier=1.5
spring.cloud.vault.retry.max-attempts=15

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Tracing
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
management.otlp.tracing.transport=http
otel.service.name=platform-api

logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# platform-api self-identity (used by self-registration writer + ServiceClient)
# Registration auto-config disabled — platform-api writes its own entry
# in-process via PlatformSelfRegistration (no HTTP self-call).
platform.registration.enabled=false
platform.registration.service-code=platform
platform.registration.extra-paths=/v3/api-docs/**,/swagger-ui/**
platform.registration.self-base-url=${SPE_SELF_BASE_URL:http://platform-api:8084}
platform.registration.platform-url=${PLM_PLATFORM_URL:http://platform-api:8084}
platform.registration.service-secret=${plm.service.secret}
platform.registration.space-tag=${SPE_SPACE_TAG:}

# NATS — platform-api now publishes ENVIRONMENT_CHANGED, PLATFORM_RESTARTED,
# SETTINGS_CHANGED, EXPECTED_SERVICES_CHANGED.
plm.nats.enabled=${PLM_NATS_ENABLED:true}
plm.nats.url=${NATS_URL:nats://nats:4222}
plm.nats.connection-name=platform-api

# Heartbeat (probe registered instances)
platform.heartbeat.interval-ms=10000
platform.heartbeat.failure-threshold=3
platform.heartbeat.timeout-ms=3000

# NATS monitoring HTTP endpoint (used by /status/nats)
nats.monitoring.url=${NATS_MONITORING_URL:http://nats:8222}

# Expected-services list (moved from spe-api). Baseline pno+platform always present.
platform.expected-services=${PLATFORM_EXPECTED_SERVICES:psm,pno,psa,platform,ws,spe,dst}

# Shared platform-lib auth filter (replaces local SettingsAuthFilter).
plm.auth.service-secret=${plm.service.secret}
plm.auth.clock-skew-seconds=${plm.jwt.clock-skew-seconds:5}
# /status and /status/nats are intentionally public (gateway used to host
# them on /api/spe/status — same access semantics preserved).
plm.auth.public-paths=/actuator/**,/v3/api-docs/**,/swagger-ui/**,/status,/status/**

# Self-register settings sections (platform-api publishes its own sections like Secrets).
plm.settings.enabled=${PLM_SETTINGS_ENABLED:true}
plm.settings.settings-url=${PLM_PLATFORM_URL:http://platform-api:8084}
plm.settings.service-code=platform
plm.settings.self-base-url=${SPE_SELF_BASE_URL:http://platform-api:8084}
plm.settings.service-secret=${plm.service.secret}

# H2 datasource (local dev / tests — overridden by docker-compose env vars)
spring.datasource.url=jdbc:h2:mem:platformdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=VALUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jooq.sql-dialect=POSTGRES
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Logging
logging.level.root=INFO
