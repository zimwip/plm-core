spring.application.name=spe-api
server.port=8082

spring.main.web-application-type=reactive

# ============================================================
# Vault (demo): spe-api resolves PLM_SERVICE_SECRET from secret/plm.
# ============================================================
spring.config.import=optional:vault://
spring.cloud.vault.uri=${VAULT_ADDR:http://vault:8200}
spring.cloud.vault.authentication=TOKEN
spring.cloud.vault.token=${VAULT_TOKEN:plm-demo-services}
spring.cloud.vault.kv.enabled=true
spring.cloud.vault.kv.backend=secret
spring.cloud.vault.kv.application-name=plm
spring.cloud.vault.fail-fast=false

# Inter-service secret — HMAC signing key. Sourced from Vault key plm.service.secret.
# plm.service.secret=<resolved-from-vault>

# JWT tuning — resolved from Vault
# plm.jwt.ttl-seconds=<resolved-from-vault>
# plm.jwt.clock-skew-seconds=<resolved-from-vault>
# plm.jwt.session-ttl-seconds=<resolved-from-vault>

# Downstream services (fallback — registry is the runtime source of truth)
pno.api.url=http://pno-api:8081

# Platform-lib self-registration auto-config: disabled (spe-api is the registry itself)
spe.registration.enabled=false

# Heartbeat
spe.heartbeat.interval-ms=10000
spe.heartbeat.failure-threshold=3
spe.heartbeat.timeout-ms=3000

# Gateway — routes come from ServiceRegistry, not static properties
spring.cloud.gateway.discovery.locator.enabled=false

# Actuator
management.endpoints.web.exposure.include=health,info,gateway,metrics,prometheus
management.endpoint.health.show-details=always

# OpenTelemetry tracing (OTLP/HTTP → Jaeger :4318)
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
management.otlp.tracing.transport=http
otel.service.name=spe-api

# Trace id + span id in logs (MDC)
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# Logging
logging.level.org.springframework.cloud.gateway=INFO
logging.level.com.spe=INFO
