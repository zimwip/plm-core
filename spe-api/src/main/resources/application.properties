spring.application.name=spe-api
server.port=8082

spring.main.web-application-type=reactive

# Inter-service secret — shared HMAC key for JWT signing (HS256) and registry auth.
# Must be >= 32 bytes in production. Override via PLM_SERVICE_SECRET env var.
plm.service.secret=dev-secret-change-in-prod-dev-secret-change-in-prod

# JWT
plm.jwt.ttl-seconds=60
plm.jwt.clock-skew-seconds=5
plm.jwt.session-ttl-seconds=3600

# Downstream services (fallback — registry is the runtime source of truth)
pno.api.url=http://pno-api:8081

# Heartbeat
spe.heartbeat.interval-ms=10000
spe.heartbeat.failure-threshold=3
spe.heartbeat.timeout-ms=3000

# Gateway — routes come from ServiceRegistry, not static properties
spring.cloud.gateway.discovery.locator.enabled=false

# Actuator
management.endpoints.web.exposure.include=health,info,gateway,metrics,prometheus
management.endpoint.health.show-details=always

# OpenTelemetry tracing (OTLP/HTTP → Jaeger :4318)
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
management.otlp.tracing.transport=http
otel.service.name=spe-api

# Trace id + span id in logs (MDC)
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# Logging
logging.level.org.springframework.cloud.gateway=INFO
logging.level.com.spe=INFO
