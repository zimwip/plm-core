spring.application.name=spe-api
server.port=8082

spring.main.web-application-type=reactive

# ============================================================
# Vault (demo): spe-api resolves PLM_SERVICE_SECRET from secret/plm.
# ============================================================
spring.config.import=vault://
spring.cloud.vault.uri=${VAULT_ADDR:http://vault:8200}
spring.cloud.vault.authentication=TOKEN
spring.cloud.vault.token=${VAULT_TOKEN:plm-demo-services}
spring.cloud.vault.kv.enabled=true
spring.cloud.vault.kv.backend=secret
spring.cloud.vault.kv.application-name=plm
spring.cloud.vault.kv.default-context=plm
spring.cloud.vault.fail-fast=true
# Retry while vault is still starting / DNS not yet resolvable.
spring.cloud.vault.retry.enabled=true
spring.cloud.vault.retry.initial-interval=1500
spring.cloud.vault.retry.max-interval=10000
spring.cloud.vault.retry.multiplier=1.5
spring.cloud.vault.retry.max-attempts=15

# Inter-service secret — HMAC signing key. Sourced from Vault key plm.service.secret.
# plm.service.secret=<resolved-from-vault>

# JWT tuning — resolved from Vault
# plm.jwt.ttl-seconds=<resolved-from-vault>
# plm.jwt.clock-skew-seconds=<resolved-from-vault>
# plm.jwt.session-ttl-seconds=<resolved-from-vault>

# Downstream services (fallback — registry is the runtime source of truth)
pno.api.url=http://pno-api:8081

# Gateway is a read-only consumer of platform-api's environment registry —
# subscribes via NATS + HTTP-pull, never registers itself.
platform.registration.enabled=true
platform.registration.subscribe-only=true
platform.registration.service-code=spe
platform.registration.platform-url=${PLM_PLATFORM_URL:http://platform-api:8084}
platform.registration.self-base-url=${SPE_SELF_BASE_URL:http://spe-api:8082}
platform.registration.service-secret=${plm.service.secret}

# Settings-api registration
plm.settings.enabled=${PLM_SETTINGS_ENABLED:false}
plm.settings.settings-url=${PLM_PLATFORM_URL:http://platform-api:8084}
plm.settings.service-code=spe
plm.settings.self-base-url=${SPE_SELF_BASE_URL:http://spe-api:8082}
plm.settings.service-secret=${plm.service.secret}

# NATS — gateway subscribes to env.global.* events from platform-api
plm.nats.enabled=${PLM_NATS_ENABLED:true}
plm.nats.url=${NATS_URL:nats://nats:4222}
plm.nats.connection-name=spe-api

# Gateway — routes come from LocalServiceRegistry (mirror of platform-api),
# not static properties.
spring.cloud.gateway.discovery.locator.enabled=false

# Actuator
management.endpoints.web.exposure.include=health,info,gateway,metrics,prometheus
management.endpoint.health.show-details=always

# OpenTelemetry tracing (OTLP/HTTP → Jaeger :4318)
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
management.otlp.tracing.transport=http
otel.service.name=spe-api

# Trace id + span id in logs (MDC)
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# Logging
logging.level.org.springframework.cloud.gateway=INFO
logging.level.com.spe=INFO
