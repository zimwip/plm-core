spring.application.name=dst
server.port=8086

# ============================================================
# Vault (demo): all secret/sensitive config sourced from secret/plm.
# ============================================================
spring.config.import=vault://
spring.cloud.vault.uri=${VAULT_ADDR:http://vault:8200}
spring.cloud.vault.authentication=TOKEN
spring.cloud.vault.token=${VAULT_TOKEN:plm-demo-services}
spring.cloud.vault.kv.enabled=true
spring.cloud.vault.kv.backend=secret
spring.cloud.vault.kv.application-name=plm
spring.cloud.vault.kv.default-context=plm
spring.cloud.vault.fail-fast=true
spring.cloud.vault.retry.enabled=true
spring.cloud.vault.retry.initial-interval=1500
spring.cloud.vault.retry.max-interval=10000
spring.cloud.vault.retry.multiplier=1.5
spring.cloud.vault.retry.max-attempts=15

# H2 (local dev / tests). Overridden by docker-compose env to PostgreSQL.
spring.datasource.url=jdbc:h2:mem:dstdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=VALUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jooq.sql-dialect=POSTGRES
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Multipart upload limits — large enough for typical CAD/document binaries.
spring.servlet.multipart.max-file-size=1GB
spring.servlet.multipart.max-request-size=1GB

# Local file storage (overridden by env in docker-compose to /var/lib/dst-data)
dst.storage.root=${DST_STORAGE_ROOT:/tmp/dst-data}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# OpenTelemetry tracing
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
management.otlp.tracing.transport=http
otel.service.name=dst

logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# Inter-service auth
plm.auth.service-secret=${plm.service.secret}
plm.auth.clock-skew-seconds=${plm.jwt.clock-skew-seconds:5}
plm.auth.public-paths=/actuator/**,/v3/api-docs/**,/swagger-ui/**,/ui/**

# platform-api self-registration
platform.registration.service-code=dst
platform.registration.extra-paths=/v3/api-docs/**,/swagger-ui/**
platform.registration.self-base-url=${SPE_SELF_BASE_URL:http://dst:8086}
platform.registration.platform-url=${PLM_PLATFORM_URL:http://platform-api:8084}
platform.registration.service-secret=${plm.service.secret}
platform.registration.space-tag=${SPE_SPACE_TAG:}

# Settings page registration (platform-api)
plm.settings.enabled=${PLM_SETTINGS_ENABLED:false}
plm.settings.settings-url=${PLM_PLATFORM_URL:http://platform-api:8084}
plm.settings.service-code=dst
plm.settings.self-base-url=${SPE_SELF_BASE_URL:http://localhost:8086}
plm.settings.service-secret=${plm.service.secret:}

# Permission scope registration (pno-api)
plm.permission.enabled=${PLM_PERMISSION_ENABLED:true}
plm.permission.pno-url=${PNO_API_URL:http://pno-api:8081}

# Federated resource catalog registration
plm.resources.enabled=${PLM_RESOURCES_ENABLED:true}
plm.resources.platform-url=${PLM_PLATFORM_URL:http://platform-api:8084}

# UI plugin bundles served at /api/dst/ui/*
plm.ui.enabled=true

# NATS
plm.nats.enabled=${PLM_NATS_ENABLED:false}
plm.nats.url=${NATS_URL:nats://nats:4222}
plm.nats.connection-name=dst

logging.level.org.jooq.tools.LoggerListener=WARN
logging.level.com.dst=INFO
