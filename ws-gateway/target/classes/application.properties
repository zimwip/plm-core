spring.application.name=ws-gateway
server.port=8085

# NATS
plm.nats.enabled=true
plm.nats.url=${NATS_URL:nats://nats:4222}
plm.nats.connection-name=ws-gateway

# Vault (shared secret for JWT verification)
spring.config.import=optional:vault://
spring.cloud.vault.uri=${VAULT_ADDR:http://vault:8200}
spring.cloud.vault.authentication=TOKEN
spring.cloud.vault.token=${VAULT_TOKEN:plm-demo-services}
spring.cloud.vault.kv.enabled=true
spring.cloud.vault.kv.backend=secret
spring.cloud.vault.kv.application-name=plm
spring.cloud.vault.kv.default-context=plm
spring.cloud.vault.fail-fast=false

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# OpenTelemetry tracing
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
management.otlp.tracing.transport=http
otel.service.name=ws-gateway
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# SPE gateway self-registration
spe.registration.service-code=ws
spe.registration.self-base-url=${SPE_SELF_BASE_URL:http://ws-gateway:8085}
spe.registration.spe-url=${SPE_API_URL:http://spe-api:8082}
spe.registration.service-secret=${plm.service.secret}

# Shared platform-lib auth filter — protects HTTP endpoints (actuator + future admin) and
# the WebSocket upgrade. JwtHandshakeInterceptor still re-parses claims afterwards to
# attach userId / projectSpaceId to the WebSocket session attributes.
plm.auth.service-secret=${plm.service.secret}
plm.auth.clock-skew-seconds=${plm.jwt.clock-skew-seconds:5}

# Tomcat sends a 302 to "/api/ws/" when a request hits the bare context-root "/api/ws".
# spe-api's reactor-netty WebSocket client refuses to follow redirects during the upgrade
# handshake ("Invalid handshake response getStatus: 302"), so disable that redirect and
# let the root handler serve the upgrade directly.
server.tomcat.redirect-context-root=false
