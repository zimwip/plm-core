spring.application.name=psm-admin
server.port=8083

# ============================================================
# Vault (demo): all secret/sensitive config sourced from secret/plm.
# ============================================================
spring.config.import=vault://
spring.cloud.vault.uri=${VAULT_ADDR:http://vault:8200}
spring.cloud.vault.authentication=TOKEN
spring.cloud.vault.token=${VAULT_TOKEN:plm-demo-services}
spring.cloud.vault.kv.enabled=true
spring.cloud.vault.kv.backend=secret
spring.cloud.vault.kv.application-name=plm
spring.cloud.vault.kv.default-context=plm
spring.cloud.vault.fail-fast=true
# Retry while vault is still starting / DNS not yet resolvable.
spring.cloud.vault.retry.enabled=true
spring.cloud.vault.retry.initial-interval=1500
spring.cloud.vault.retry.max-interval=10000
spring.cloud.vault.retry.multiplier=1.5
spring.cloud.vault.retry.max-attempts=15

# H2 datasource (local dev / tests -- overridden by docker-compose env vars)
spring.datasource.url=jdbc:h2:mem:psmadmindb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=VALUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JOOQ
spring.jooq.sql-dialect=POSTGRES

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# OpenTelemetry tracing (OTLP/HTTP -> Jaeger :4318)
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
management.otlp.tracing.transport=http
otel.service.name=psm-admin

# Trace id + span id in logs (MDC)
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# Inter-service secret (must match pno.service.secret in pno-api)
# plm.service.secret=<resolved-from-vault>

# JWT (verify only -- spe-api mints)
# plm.jwt.clock-skew-seconds=<resolved-from-vault>

# Shared platform-lib auth filter (replaces local PlmAdminAuthFilter).
plm.auth.service-secret=${plm.service.secret}
plm.auth.clock-skew-seconds=${plm.jwt.clock-skew-seconds:5}

# platform-api self-registration (handled by platform-lib auto-config)
platform.registration.service-code=psa
platform.registration.extra-paths=/v3/api-docs/**,/swagger-ui/**
platform.registration.self-base-url=${SPE_SELF_BASE_URL:http://psm-admin:8083}
platform.registration.platform-url=${PLM_PLATFORM_URL:http://platform-api:8084}
platform.registration.service-secret=${plm.service.secret}
platform.registration.space-tag=${SPE_SPACE_TAG:}

# Settings-api registration
plm.settings.enabled=${PLM_SETTINGS_ENABLED:false}
plm.settings.settings-url=${PLM_PLATFORM_URL:http://platform-api:8084}
plm.settings.service-code=psa
plm.settings.self-base-url=${SPE_SELF_BASE_URL:http://psm-admin:8083}
plm.settings.service-secret=${plm.service.secret}

# Permission scope registration with pno-api
# (service-code / self-base-url / service-secret reused from spe.registration.*)
plm.permission.enabled=${PLM_PERMISSION_ENABLED:false}
plm.permission.pno-url=${PLM_PERMISSION_PNO_URL:http://pno-api:8081}

# NATS messaging (config change notifications)
plm.nats.enabled=${PLM_NATS_ENABLED:false}
plm.nats.url=${NATS_URL:nats://nats:4222}
plm.nats.connection-name=psm-admin

# UI plugin bundles served at /api/psa/ui/* — must be public (browser dynamic import sends no auth headers)
plm.auth.public-paths=/actuator/**,/v3/api-docs/**,/swagger-ui/**,/ui/**
plm.ui.enabled=true

# Logging
logging.level.org.jooq.tools.LoggerListener=WARN
