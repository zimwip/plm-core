spring.application.name=pno-api
server.port=8081

# H2 datasource (local dev / tests — overridden by docker-compose env vars)
spring.datasource.url=jdbc:h2:mem:pnodb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=VALUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JOOQ
spring.jooq.sql-dialect=POSTGRES

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# OpenTelemetry tracing (OTLP/HTTP → Jaeger :4318)
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
management.otlp.tracing.transport=http
otel.service.name=pno-api

# Trace id + span id in logs (MDC)
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# Inter-service secret — shared HMAC key (HS256) for JWT verification + S2S context endpoint
# Override via PLM_SERVICE_SECRET env var in production. Must be >= 32 bytes.
plm.service.secret=dev-secret-change-in-prod-dev-secret-change-in-prod

# JWT
plm.jwt.clock-skew-seconds=5

# SPE gateway — where to register at startup
spe.api.url=http://spe-api:8082
spe.self.base-url=http://pno-api:8081

# Logging
logging.level.org.jooq.tools.LoggerListener=WARN
