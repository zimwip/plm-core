spring.application.name=pno-api
server.port=8081

# H2 datasource (local dev / tests — overridden by docker-compose env vars)
spring.datasource.url=jdbc:h2:mem:pnodb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=VALUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JOOQ
spring.jooq.sql-dialect=POSTGRES

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Inter-service secret — shared with psm-api
# Override via PLM_SERVICE_SECRET env var in production (maps to plm.service.secret)
plm.service.secret=dev-secret-change-in-prod

# Logging
logging.level.org.jooq.tools.LoggerListener=WARN
