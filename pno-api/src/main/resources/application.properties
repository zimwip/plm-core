spring.application.name=pno-api
server.port=8081

# ============================================================
# Vault (demo): all secret/sensitive config sourced from secret/plm.
# `optional:` lets tests start without Vault.
# ============================================================
spring.config.import=optional:vault://
spring.cloud.vault.uri=${VAULT_ADDR:http://vault:8200}
spring.cloud.vault.authentication=TOKEN
spring.cloud.vault.token=${VAULT_TOKEN:plm-demo-services}
spring.cloud.vault.kv.enabled=true
spring.cloud.vault.kv.backend=secret
spring.cloud.vault.kv.application-name=plm
spring.cloud.vault.fail-fast=false

# H2 datasource (local dev / tests — overridden by docker-compose env vars)
spring.datasource.url=jdbc:h2:mem:pnodb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=VALUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JOOQ
spring.jooq.sql-dialect=POSTGRES

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# OpenTelemetry tracing (OTLP/HTTP → Jaeger :4318)
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
management.otlp.tracing.transport=http
otel.service.name=pno-api

# Trace id + span id in logs (MDC)
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# Inter-service secret — shared HMAC key (HS256). Sourced from Vault key plm.service.secret.
# plm.service.secret=<resolved-from-vault>

# JWT — resolved from Vault
# plm.jwt.clock-skew-seconds=<resolved-from-vault>

# SPE gateway self-registration (handled by platform-lib auto-config)
spe.registration.service-code=pno-api
spe.registration.route-prefix=/api/pno/**
spe.registration.self-base-url=${SPE_SELF_BASE_URL:http://pno-api:8081}
spe.registration.spe-url=${SPE_API_URL:http://spe-api:8082}
spe.registration.service-secret=${plm.service.secret}
spe.registration.space-tag=${SPE_SPACE_TAG:}

# Logging
logging.level.org.jooq.tools.LoggerListener=WARN
